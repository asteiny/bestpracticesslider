<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Best Practices Strategy Selector</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #BA7517;
    --gold-bg: #FAEEDA;
    --gold-text: #633806;
    --silver: #5F5E5A;
    --silver-bg: #F1EFE8;
    --silver-text: #2C2C2A;
    --bronze: #993C1D;
    --bronze-bg: #FAECE7;
    --bronze-text: #4A1B0C;
    --uta-blue: #004a98;
    --uta-blue-light: #e8f0fa;
    --bg-primary: #ffffff;
    --bg-secondary: #f7f7f5;
    --bg-tertiary: #f0efec;
    --text-primary: #1a1a18;
    --text-secondary: #5a5a57;
    --text-tertiary: #8a8a87;
    --border-light: rgba(0,0,0,0.10);
    --border-mid: rgba(0,0,0,0.18);
    --border-strong: rgba(0,0,0,0.26);
    --radius-md: 8px;
    --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --gold-bg: #3d2800;
      --gold-text: #FAC775;
      --silver-bg: #2a2a28;
      --silver-text: #D3D1C7;
      --bronze-bg: #3d1800;
      --bronze-text: #F5C4B3;
      --uta-blue-light: #001e40;
      --bg-primary: #1e1e1c;
      --bg-secondary: #252523;
      --bg-tertiary: #2c2c2a;
      --text-primary: #e8e8e4;
      --text-secondary: #a8a8a4;
      --text-tertiary: #6a6a67;
      --border-light: rgba(255,255,255,0.08);
      --border-mid: rgba(255,255,255,0.14);
      --border-strong: rgba(255,255,255,0.22);
    }
  }

  html, body {
    font-family: var(--font);
    background: var(--bg-tertiary);
    color: var(--text-primary);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  .app-wrapper {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 20px 48px;
  }

  .app-header {
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 0.5px solid var(--border-light);
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
  }

  .app-title {
    font-size: 17px;
    font-weight: 600;
    color: var(--uta-blue);
    letter-spacing: -0.01em;
  }

  .app-subtitle {
    font-size: 13px;
    color: var(--text-tertiary);
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .filter-group {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-label {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-right: 2px;
  }

  .filter-btn {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 0.5px solid var(--border-mid);
    background: var(--bg-primary);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--font);
  }

  .filter-btn.active {
    background: var(--uta-blue);
    color: #fff;
    border-color: var(--uta-blue);
  }

  .filter-btn:hover:not(.active) {
    background: var(--bg-secondary);
    border-color: var(--border-strong);
  }

  .clear-btn {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 0.5px solid var(--border-mid);
    background: transparent;
    color: var(--text-tertiary);
    cursor: pointer;
    font-family: var(--font);
    transition: all 0.15s;
  }

  .clear-btn:hover {
    color: var(--text-primary);
    border-color: var(--border-strong);
  }

  .summary-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }

  .summary-card {
    border-radius: var(--radius-md);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .summary-card.gold { background: var(--gold-bg); }
  .summary-card.silver { background: var(--silver-bg); }
  .summary-card.bronze { background: var(--bronze-bg); }

  .summary-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .gold .summary-dot { background: var(--gold); }
  .silver .summary-dot { background: var(--silver); }
  .bronze .summary-dot { background: var(--bronze); }

  .summary-inner {}

  .summary-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-weight: 600;
  }

  .gold .summary-label { color: var(--gold-text); }
  .silver .summary-label { color: var(--silver-text); }
  .bronze .summary-label { color: var(--bronze-text); }

  .summary-count {
    font-size: 24px;
    font-weight: 600;
    line-height: 1.1;
    margin-top: 2px;
  }

  .gold .summary-count { color: var(--gold-text); }
  .silver .summary-count { color: var(--silver-text); }
  .bronze .summary-count { color: var(--bronze-text); }

  .selection-note {
    font-size: 11px;
    margin-top: 2px;
  }
  .gold .selection-note { color: var(--gold-text); opacity: 0.75; }
  .silver .selection-note { color: var(--silver-text); opacity: 0.75; }
  .bronze .selection-note { color: var(--bronze-text); opacity: 0.75; }

  .section-header {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-tertiary);
    font-weight: 600;
    padding: 10px 0 8px;
    border-top: 0.5px solid var(--border-light);
    margin-top: 16px;
    margin-bottom: 8px;
  }

  .section-header:first-child { margin-top: 0; border-top: none; }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 8px;
    margin-bottom: 4px;
  }

  .strategy-card {
    background: var(--bg-primary);
    border: 0.5px solid var(--border-light);
    border-radius: var(--radius-lg);
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    display: flex;
    flex-direction: column;
    gap: 8px;
    user-select: none;
  }

  .strategy-card:hover {
    border-color: var(--border-mid);
    background: var(--bg-secondary);
  }

  .strategy-card.selected {
    border-color: var(--uta-blue);
    background: var(--uta-blue-light);
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }

  .card-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.4;
    flex: 1;
  }

  .checkbox {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    flex-shrink: 0;
    border: 1.5px solid var(--border-mid);
    background: var(--bg-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    margin-top: 1px;
  }

  .strategy-card.selected .checkbox {
    background: var(--uta-blue);
    border-color: var(--uta-blue);
  }

  .checkbox i {
    font-size: 10px;
    color: #fff;
    display: none;
  }

  .strategy-card.selected .checkbox i {
    display: block;
  }

  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tier-badges {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .tier-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .tier-badge.gold { background: var(--gold-bg); color: var(--gold-text); }
  .tier-badge.silver { background: var(--silver-bg); color: var(--silver-text); }
  .tier-badge.bronze { background: var(--bronze-bg); color: var(--bronze-text); }

  .placetype-badges {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .pt-badge {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 10px;
    background: var(--bg-secondary);
    color: var(--text-secondary);
    border: 0.5px solid var(--border-light);
  }

  .no-tier {
    font-size: 11px;
    color: var(--text-tertiary);
    font-style: italic;
  }

  .info-btn {
    font-size: 11px;
    color: var(--text-tertiary);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    gap: 3px;
    transition: color 0.15s;
    font-family: var(--font);
  }

  .info-btn:hover { color: var(--uta-blue); }
  .info-btn i { font-size: 14px; }

  .empty-state {
    font-size: 13px;
    color: var(--text-tertiary);
    padding: 24px 0;
    text-align: center;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .modal-overlay.open {
    display: flex;
  }

  .modal {
    background: var(--bg-primary);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border-mid);
    padding: 24px;
    max-width: 540px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    position: relative;
  }

  .modal-dvar {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-tertiary);
    font-weight: 600;
    margin-bottom: 6px;
  }

  .modal-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }

  .modal-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.4;
  }

  .modal-close {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-tertiary);
    padding: 2px;
    flex-shrink: 0;
    font-size: 20px;
    line-height: 1;
    transition: color 0.15s;
  }

  .modal-close:hover { color: var(--text-primary); }

  .modal-divider {
    height: 0.5px;
    background: var(--border-light);
    margin-bottom: 14px;
  }

  .modal-desc {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.7;
    margin-bottom: 18px;
  }

  .modal-badges {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .modal-footer {
    margin-top: 20px;
    padding-top: 14px;
    border-top: 0.5px solid var(--border-light);
    display: flex;
    justify-content: flex-end;
  }

  .modal-select-btn {
    font-size: 13px;
    padding: 7px 16px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--uta-blue);
    background: var(--uta-blue);
    color: #fff;
    cursor: pointer;
    font-family: var(--font);
    transition: opacity 0.15s;
  }

  .modal-select-btn:hover { opacity: 0.88; }
  .modal-select-btn.deselect {
    background: transparent;
    color: var(--uta-blue);
  }
</style>
</head>
<body>

<div class="app-wrapper">
  <div class="app-header">
    <span class="app-title">Best Practices Strategy Selector</span>
    <span class="app-subtitle">Wasatch Front Transit-Supportive Development Toolkit</span>
  </div>

  <div class="top-bar">
    <div class="filter-group">
      <span class="filter-label">Placetype:</span>
      <button class="filter-btn active" data-pt="all" onclick="setFilter('all')">All</button>
      <button class="filter-btn" data-pt="Center" onclick="setFilter('Center')">Centers</button>
      <button class="filter-btn" data-pt="District" onclick="setFilter('District')">Districts</button>
      <button class="filter-btn" data-pt="Neighborhood" onclick="setFilter('Neighborhood')">Neighborhoods</button>
    </div>
    <button class="clear-btn" onclick="clearAll()">
      <i class="ti ti-x" style="font-size:11px; vertical-align:-1px; margin-right:3px;"></i>Clear selection
    </button>
  </div>

  <div class="summary-bar">
    <div class="summary-card gold">
      <div class="summary-dot"></div>
      <div class="summary-inner">
        <div class="summary-label">Gold</div>
        <div class="summary-count" id="count-gold">0</div>
        <div class="summary-note" id="note-gold" style="font-size:10px;color:var(--gold-text);opacity:0.7;margin-top:1px;"></div>
      </div>
    </div>
    <div class="summary-card silver">
      <div class="summary-dot"></div>
      <div class="summary-inner">
        <div class="summary-label">Silver</div>
        <div class="summary-count" id="count-silver">0</div>
        <div class="summary-note" id="note-silver" style="font-size:10px;color:var(--silver-text);opacity:0.7;margin-top:1px;"></div>
      </div>
    </div>
    <div class="summary-card bronze">
      <div class="summary-dot"></div>
      <div class="summary-inner">
        <div class="summary-label">Bronze</div>
        <div class="summary-count" id="count-bronze">0</div>
        <div class="summary-note" id="note-bronze" style="font-size:10px;color:var(--bronze-text);opacity:0.7;margin-top:1px;"></div>
      </div>
    </div>
  </div>

  <div id="list-container"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal-title-el">
    <div class="modal-dvar" id="modal-dvar"></div>
    <div class="modal-header">
      <div class="modal-title" id="modal-title-el"></div>
      <button class="modal-close" onclick="closeModal()" aria-label="Close dialog">
        <i class="ti ti-x"></i>
      </button>
    </div>
    <div class="modal-divider"></div>
    <div class="modal-desc" id="modal-desc"></div>
    <div class="modal-badges" id="modal-badges"></div>
    <div class="modal-footer">
      <button class="modal-select-btn" id="modal-select-btn" onclick="toggleFromModal()"></button>
    </div>
  </div>
</div>

<script>
var strategies = [
  {id:0,dvar:"D1: Density",short:"Establish minimum residential densities near transit",long:"Require at least 15\u201330 dwelling units per gross acre within \u00bd mile of frequent transit stops; allow higher FAR bonuses for mixed-income projects.",Center:0,District:1,Neighborhood:0,Gold:1,Silver:0,Bronze:0},
  {id:1,dvar:"D1: Density",short:"Establish a density gradient\u2014highest densities closest to transit stops",long:"Zone for the highest densities within \u00bc mile of transit stations, with permitted density tapering with distance. This gradient approach maximizes ridership more effectively than uniform density.",Center:0,District:0,Neighborhood:1,Gold:1,Silver:0,Bronze:1},
  {id:2,dvar:"D1: Density",short:"Adopt transit overlay zoning districts",long:"Layer a TOD overlay onto existing base zones to unlock greater density, reduced setbacks, and streamlined approvals within station area boundaries to concentrate development near stations and/or stops.",Center:0,District:1,Neighborhood:0,Gold:0,Silver:1,Bronze:1},
  {id:3,dvar:"D1: Density",short:"Permit accessory dwelling units (ADUs) by right in transit corridors",long:"Allow ADUs and detached backyard cottages citywide, with streamlined approval in transit-served neighborhoods, adding gentle density without displacing neighborhood character. Moderate density increases do raise transit use, especially in neighborhood contexts.",Center:1,District:0,Neighborhood:0,Gold:0,Silver:0,Bronze:0},
  {id:4,dvar:"D1: Density",short:"Use form-based codes in station areas",long:"Replace use-based zoning with form standards (build-to lines, active frontages, step-backs) that ensure compact, transit-supportive built form regardless of specific use.",Center:0,District:0,Neighborhood:1,Gold:0,Silver:0,Bronze:1},
  {id:5,dvar:"D1: Density",short:"Streamline the permitting and entitlement process",long:"Remove subjective language from zoning. Make more decisions ministerial. Provide pre-approved plans.",Center:1,District:1,Neighborhood:1,Gold:0,Silver:1,Bronze:1},
  {id:6,dvar:"D1: Density",short:"Convert underutilized surface parking to housing or mixed-use",long:"Establish reuse/redevelopment pathways for surface lots within \u00bd mile of transit to promote infill development that is pedestrian- and transit-supportive.",Center:0,District:0,Neighborhood:1,Gold:0,Silver:1,Bronze:0},
  {id:7,dvar:"D2: Diversity",short:"Require or incentivize mixed-use development",long:"Mandate active ground-floor uses (retail, services, childcare, or live-work) along primary transit corridors.",Center:1,District:0,Neighborhood:0,Gold:0,Silver:0,Bronze:0},
  {id:8,dvar:"D2: Diversity",short:"Establish mixed-use minimums in TOD overlay zones",long:"Require a minimum percentage (10\u201320%) of square footage in transit station area projects to be non-residential to ensure trip diversity and internal capture.",Center:1,District:0,Neighborhood:1,Gold:1,Silver:0,Bronze:1},
  {id:9,dvar:"D2: Diversity",short:"Zone for neighborhood-serving retail near transit stops",long:"Allow small-scale retail and services (corner stores, clinics, daycares) in residential zones within \u00bc mile of transit, reducing car trips for daily errands.",Center:1,District:1,Neighborhood:0,Gold:0,Silver:1,Bronze:0},
  {id:10,dvar:"D2: Diversity",short:"Integrate civic and institutional uses in station areas",long:"Co-locate libraries, schools, social services, and health clinics within station area plans so residents can chain transit trips to multiple destinations.",Center:0,District:0,Neighborhood:0,Gold:1,Silver:0,Bronze:0},
  {id:11,dvar:"D2: Diversity",short:"Encourage vertical mixed-use development",long:"Allow and incentivize residential above retail or office, reducing walking distances between daily destinations and activating street-level uses throughout the day.",Center:1,District:1,Neighborhood:0,Gold:1,Silver:1,Bronze:0},
  {id:12,dvar:"D3: Design",short:"Create complete streets with small-block grids",long:"Require short block lengths (250\u2013400 ft) and fine-grained street networks in new development to improve walkability and transit access.",Center:0,District:0,Neighborhood:0,Gold:0,Silver:1,Bronze:1},
  {id:13,dvar:"D3: Design",short:"Eliminate or substantially reduce parking minimums near transit",long:"Remove mandatory parking minimums within \u00bc\u2013\u00bd mile of transit stops; establish maximums to prevent excess supply. Visible parking and dead space are key walkability and transit deterrents.",Center:0,District:1,Neighborhood:1,Gold:0,Silver:1,Bronze:1},
  {id:14,dvar:"D3: Design",short:"Require pedestrian-priority street design",long:"Mandate wide sidewalks (min. 8\u201312 ft), street trees, shade structures, and weather-protective canopies along routes to transit stops.",Center:1,District:0,Neighborhood:0,Gold:0,Silver:1,Bronze:0},
  {id:15,dvar:"D3: Design",short:"Build continuous protected bicycle networks to transit",long:"Develop protected bike lanes or multi-use trails connecting residential areas and employment centers to transit stops; provide secure bike parking and bike share at stations.",Center:1,District:0,Neighborhood:1,Gold:1,Silver:0,Bronze:1},
  {id:16,dvar:"D3: Design",short:"Require active building frontages along transit corridors",long:"Establish build-to lines, window/door transparency requirements, and prohibit blank walls to encourage street-oriented buildings. Mandate active ground-floor uses along primary transit corridors.",Center:1,District:0,Neighborhood:0,Gold:1,Silver:1,Bronze:0},
  {id:17,dvar:"D3: Design",short:"Prohibit auto-oriented uses near transit corridors",long:"Prohibit auto-oriented uses such as drive-throughs or auto-service facilities along transit corridors. If already permitted, consider capping future development and/or adopting pedestrian-oriented design standards that mitigate the impact on pedestrian experience and safety.",Center:1,District:1,Neighborhood:1,Gold:1,Silver:1,Bronze:1},
  {id:18,dvar:"D3: Design",short:"Implement traffic calming and safe pedestrian crossings near transit stops",long:"Install raised crosswalks, pedestrian refuge islands, curb extensions, and reduced signal cycle lengths.",Center:0,District:1,Neighborhood:1,Gold:0,Silver:1,Bronze:0},
  {id:19,dvar:"D3: Design",short:"Require first/last mile connectivity plans for major transit investments",long:"Mandate that new station areas produce a first/last mile plan inventorying sidewalk gaps, crosswalk needs, and bike infrastructure within \u00bd mile.",Center:0,District:1,Neighborhood:1,Gold:0,Silver:0,Bronze:1},
  {id:20,dvar:"D3: Design",short:"Install street furniture, public art, and wayfinding at transit stops",long:"Provide benches, lighting, trash receptacles, bicycle parking, and public art near transit stops and on key pedestrian routes to reinforce the transit environment as welcoming and navigable.",Center:1,District:0,Neighborhood:0,Gold:0,Silver:0,Bronze:0},
  {id:21,dvar:"D4: Destinations",short:"Concentrate employment in transit-accessible locations",long:"Prioritize employment center growth, office development, and major employers in areas served by high-frequency transit rather than auto-oriented suburban business parks.",Center:1,District:0,Neighborhood:0,Gold:1,Silver:1,Bronze:0},
  {id:22,dvar:"D4: Destinations",short:"Locate public facilities and anchor institutions near transit",long:"Site government offices, universities, hospitals, stadiums, and event venues at or near high-frequency transit stops to generate ridership and activate station areas.",Center:0,District:1,Neighborhood:0,Gold:0,Silver:1,Bronze:0},
  {id:23,dvar:"D4: Destinations",short:"Develop transit-adjacent parks and public spaces",long:"Create plazas, pocket parks, and greenways adjacent to transit stations to serve as gathering places and make transit stops destinations in themselves.",Center:1,District:0,Neighborhood:1,Gold:1,Silver:0,Bronze:1},
  {id:24,dvar:"D4: Destinations",short:"Pursue joint development of transit agency-owned land",long:"Partner with developers to build housing, retail, or employment uses on or adjacent to transit facilities, leveraging agency-owned land to create ridership-generating destinations.",Center:0,District:1,Neighborhood:1,Gold:0,Silver:1,Bronze:0},
  {id:25,dvar:"D5: Demographics",short:"Preserve and produce affordable housing near transit",long:"Require inclusionary zoning, community land trusts, or density bonuses tied to affordable units near transit to retain lower-income residents who depend on transit.",Center:0,District:0,Neighborhood:1,Gold:1,Silver:0,Bronze:1},
  {id:26,dvar:"D5: Demographics",short:"Anti-displacement strategies in TOD planning",long:"Adopt community benefits agreements, right-to-return policies, and tenant protections in station area plans to prevent displacement of transit-dependent populations.",Center:1,District:0,Neighborhood:0,Gold:0,Silver:1,Bronze:0},
  {id:27,dvar:"D5: Demographics",short:"Prioritize transit investments in high-need communities",long:"Use equity analysis to direct TOD planning resources, infrastructure improvements, and service enhancements to areas with high concentrations of low-income households, seniors, and zero-car households.",Center:1,District:0,Neighborhood:0,Gold:1,Silver:0,Bronze:0},

];

var selected = {};
var activeFilter = 'all';
var modalOpenId = null;

function setFilter(pt) {
  activeFilter = pt;
  document.querySelectorAll('.filter-btn').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-pt') === pt);
  });
  render();
}

function clearAll() {
  selected = {};
  updateCounts();
  render();
}

function toggleSelect(id, e) {
  if (e) e.stopPropagation();
  if (selected[id]) {
    delete selected[id];
  } else {
    selected[id] = true;
  }
  updateCounts();
  var card = document.getElementById('card-' + id);
  if (card) {
    if (selected[id]) {
      card.classList.add('selected');
    } else {
      card.classList.remove('selected');
    }
  }
  if (modalOpenId === id) {
    updateModalSelectBtn(id);
  }
}

function updateCounts() {
  var g = 0, s = 0, b = 0;
  var total = 0;
  Object.keys(selected).forEach(function(id) {
    var r = strategies[parseInt(id)];
    total++;
    if (r.Gold) g++;
    if (r.Silver) s++;
    if (r.Bronze) b++;
  });
  document.getElementById('count-gold').textContent = g;
  document.getElementById('count-silver').textContent = s;
  document.getElementById('count-bronze').textContent = b;
  var note = total > 0 ? total + ' selected' : '';
  document.getElementById('note-gold').textContent = note;
  document.getElementById('note-silver').textContent = note;
  document.getElementById('note-bronze').textContent = note;
}

function openModal(id) {
  modalOpenId = id;
  var r = strategies[id];
  document.getElementById('modal-dvar').textContent = r.dvar;
  document.getElementById('modal-title-el').textContent = r.short;
  document.getElementById('modal-desc').textContent = r.long;

  var badges = document.getElementById('modal-badges');
  var html = '';
  if (r.Gold) html += '<span class="tier-badge gold">Gold</span>';
  if (r.Silver) html += '<span class="tier-badge silver">Silver</span>';
  if (r.Bronze) html += '<span class="tier-badge bronze">Bronze</span>';
  if (r.Center) html += '<span class="pt-badge">Center</span>';
  if (r.District) html += '<span class="pt-badge">District</span>';
  if (r.Neighborhood) html += '<span class="pt-badge">Neighborhood</span>';
  badges.innerHTML = html;

  updateModalSelectBtn(id);
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-box').focus();
}

function updateModalSelectBtn(id) {
  var btn = document.getElementById('modal-select-btn');
  if (selected[id]) {
    btn.textContent = 'Remove from selection';
    btn.classList.add('deselect');
  } else {
    btn.textContent = 'Add to selection';
    btn.classList.remove('deselect');
  }
}

function toggleFromModal() {
  if (modalOpenId !== null) {
    toggleSelect(modalOpenId, null);
  }
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  modalOpenId = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) {
    closeModal();
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

function render() {
  var container = document.getElementById('list-container');
  var filtered = activeFilter === 'all'
    ? strategies
    : strategies.filter(function(r) { return r[activeFilter] === 1; });

  if (!filtered.length) {
    container.innerHTML = '<p class="empty-state">No strategies match this filter.</p>';
    return;
  }

  var groups = {};
  var groupOrder = [];
  filtered.forEach(function(r) {
    if (!groups[r.dvar]) {
      groups[r.dvar] = [];
      groupOrder.push(r.dvar);
    }
    groups[r.dvar].push(r);
  });

  var html = '';
  groupOrder.forEach(function(dvar) {
    html += '<div class="section-header">' + dvar + '</div><div class="cards-grid">';
    groups[dvar].forEach(function(r) {
      var isSel = !!selected[r.id];
      var tiers = '';
      if (r.Gold) tiers += '<span class="tier-badge gold">Gold</span>';
      if (r.Silver) tiers += '<span class="tier-badge silver">Silver</span>';
      if (r.Bronze) tiers += '<span class="tier-badge bronze">Bronze</span>';
      if (!tiers) tiers = '<span class="no-tier">No tier assigned</span>';

      var pts = '';
      if (r.Center) pts += '<span class="pt-badge">Center</span>';
      if (r.District) pts += '<span class="pt-badge">District</span>';
      if (r.Neighborhood) pts += '<span class="pt-badge">Neighborhood</span>';

      html += '<div class="strategy-card' + (isSel ? ' selected' : '') + '" id="card-' + r.id + '" onclick="toggleSelect(' + r.id + ', event)" role="checkbox" aria-checked="' + isSel + '" tabindex="0">';
      html += '<div class="card-top">';
      html += '<div class="card-title">' + r.short + '</div>';
      html += '<div class="checkbox" aria-hidden="true"><i class="ti ti-check"></i></div>';
      html += '</div>';
      html += '<div class="card-meta">';
      html += '<div class="tier-badges">' + tiers + '</div>';
      html += '<div class="placetype-badges">' + pts + '</div>';
      html += '</div>';
      html += '<button class="info-btn" onclick="openModal(' + r.id + '); event.stopPropagation();" aria-label="More information about this strategy">';
      html += '<i class="ti ti-info-circle" aria-hidden="true"></i><span>More info</span>';
      html += '</button>';
      html += '</div>';
    });
    html += '</div>';
  });

  container.innerHTML = html;
}

render();
</script>
